<body class="antialiased leading-relaxed flex flex-col min-h-screen">

    <!-- Navbar -->
    <nav class="sticky top-0 z-40 bg-white shadow-md border-b border-gray-200">

                </div>

            <div id="nav-xp-display" class="hidden md:flex items-center gap-2 bg-yellow-50 px-4 py-1.5 rounded-full border border-yellow-200 text-yellow-800 font-bold shadow-sm transition-all duration-300">

    <!-- Sidebar -->
    <div id="sidebar-backdrop" onclick="closeSidebar()" class="fixed inset-0 bg-black/50 z-[60] hidden opacity-0 transition-opacity duration-300"></div>

        <div class="p-5 border-b border-gray-200 flex justify-between items-center bg-gray-50">

        <div class="flex-1 overflow-y-auto p-4 space-y-2" id="nav-tabs"></div>
        <div class="p-4 border-t border-gray-200 bg-gray-50 text-center">
            <div class="text-sm text-gray-500">ההתקדמות שלך:</div>
            <div class="font-bold text-secondary text-xl"><span id="sidebar-xp-val">0</span> XP 🏆</div>
        </div>
    </div>

    <!-- Main Content -->
    <main class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10 space-y-16 w-full" id="main-content"></main>

    <!-- Footer -->
    <footer class="bg-gray-900 text-gray-300 mt-auto py-10 text-center text-sm border-t-4 border-secondary">
        <div class="max-w-4xl mx-auto px-4">
            <p class="font-bold text-xl text-white mb-2">מערכת למידה אינטראקטיבית - רמת בגרות ותואר</p>
            <p class="text-lg font-medium text-yellow-400 mb-4">נבו בגין - nevobegin5@gmail.com</p>
            <p class="text-gray-400 max-w-2xl mx-auto">מערכת זו פותחה להכנה מקיפה הכוללת גזרות הפועל, שם המספר, תצורת השם, הבנת הנקרא אקדמית ומבחן מסכם עם דרגות קושי דינמיות. כל הזכויות שמורות.</p>
            <button onclick="clearProgress()" class="mt-6 text-xs text-gray-600 hover:text-white underline transition-colors">איפוס התקדמות מערכת (למפתחים)</button>
        </div>
    </footer>

    <script>
        // ==========================================
        // 1. GLOBAL STATE & UTILITIES
        // ==========================================
        let currentModuleId = "dashboard"; 
        let currentQuestionIndex = 0;
        let score = 0;
        let hasAnsweredCurrent = false;
        let resultsChartInstance = null;
        let dashboardChartInstance = null;
        let currentQuizData = [];
        let currentDifficulty = 'medium'; 
        const XP_RATES = { 'easy': 20, 'medium': 40, 'hard': 60, 'mega-medium': 50, 'mega-hard': 70, 'mega-degree': 100, 'reading': 50 };
        
        let megaQuizTimer;
        let timeLeft = 120;
        let isMegaQuiz = false;
        let isReadingQuiz = false;
        let currentReadingId = null;

        let userProgress = JSON.parse(localStorage.getItem('verbHubProgress_v12')) || { 
            modules: {}, reading: {}, totalXP: 0, megaQuizHighScore: 0 
        };

        const RANKS = [
            { threshold: 0, title: "תלמיד מתחיל", icon: "🌱" },
            { threshold: 500, title: "שולט בחומר", icon: "📘" },
            { threshold: 1500, title: "מוכן לבגרות", icon: "🎓" },
            { threshold: 4000, title: "אלוף לשון", icon: "👑" },
            { threshold: 10000, title: "פרופסור לאקדמיה", icon: "🏆" }
        ];

        function initApp() {
            updateGlobalXP();
            buildNavigation();
            loadModule(currentModuleId);
        }

        function openSidebar() {
            const sidebar = document.getElementById('sidebar');
            const backdrop = document.getElementById('sidebar-backdrop');
            backdrop.classList.remove('hidden');
            setTimeout(() => {
                backdrop.classList.remove('opacity-0');
                sidebar.classList.remove('translate-x-full');
            }, 10);
        }

        function closeSidebar() {
            const sidebar = document.getElementById('sidebar');
            const backdrop = document.getElementById('sidebar-backdrop');
            sidebar.classList.add('translate-x-full');
            backdrop.classList.add('opacity-0');
            setTimeout(() => {
                backdrop.classList.add('hidden');
            }, 300);
        }

        function getCurrentRank() {
            let currentRank = RANKS[0];
            for(let r of RANKS) { if(userProgress.totalXP >= r.threshold) currentRank = r; }
            return currentRank;
        }

        function getNextRank() {
            for(let i=0; i<RANKS.length; i++) { if(userProgress.totalXP < RANKS[i].threshold) return RANKS[i]; }
            return null;
        }

        function addXP(amount) {
            userProgress.totalXP += amount;
            localStorage.setItem('verbHubProgress_v12', JSON.stringify(userProgress));
            updateGlobalXP();
        }

        function updateGlobalXP() {
            const navXp = document.getElementById('nav-xp-val');
            const sideXp = document.getElementById('sidebar-xp-val');
            if(navXp) navXp.innerText = userProgress.totalXP;
            if(sideXp) sideXp.innerText = userProgress.totalXP;
        }

        function saveModuleProgress(moduleId, difficulty, newScore, total) {
            if(!userProgress.modules[moduleId]) userProgress.modules[moduleId] = {};
            if (!userProgress.modules[moduleId][difficulty] || newScore > userProgress.modules[moduleId][difficulty].score) {
                userProgress.modules[moduleId][difficulty] = { score: newScore, total: total };
                addXP(newScore * XP_RATES[difficulty]);
            }
        }

        function saveReadingProgress(readingId, newScore, total) {
            if(!userProgress.reading) userProgress.reading = {};
            if (!userProgress.reading[readingId] || newScore > userProgress.reading[readingId].score) {
                userProgress.reading[readingId] = { score: newScore, total: total };
                addXP(newScore * XP_RATES['reading']);
            }
        }

        function clearProgress() {
            if(confirm("האם אתה בטוח שברצונך לאפס את כל ההתקדמות? פעולה זו אינה הפיכה.")) {
                localStorage.removeItem('verbHubProgress_v12');
                userProgress = { modules: {}, reading: {}, totalXP: 0, megaQuizHighScore: 0 };
                updateGlobalXP();
                loadModule('dashboard');
            }
        }

        function playAudio(text) {
            const plainText = text.replace(/<[^>]*>?/gm, '');
            const utterance = new SpeechSynthesisUtterance(plainText);
            utterance.lang = 'he-IL'; utterance.rate = 0.9;
            window.speechSynthesis.speak(utterance);
        }

        // ==========================================
        // 2. DATA STORES (10 Questions Per Level Per Module)
        // ==========================================

        const appData = {
            "nla": {
                id: "nla", label: "נל\"א", icon: "📖", title: "גזרת נל\"א (נחי ל' א')",
                intro: "גזרה של שורשים המסתיימים באות א'. ההתמודדות המרכזית בבגרות היא הבחנה בינה לבין נל\"י/ה והכרת חריגים מורפולוגיים.",
                concepts: [
                    { title: "האות א' כנחה וכעיצורית", content: "הא' נחה (אינה נהגית כלל) כשהיא מסיימת הברה, בעיקר לפני מוספיות עיצוריות (מָצָא**תִי**, קָרָא**תָ**). היא עיצורית (נהגית לחלוטין) כשיש תנועה תחתיה (קָרְ**אוּ** - יש שורוק)." },
                    { title: "הבחנה מנל\"י/ה - מבחן העבר", content: "לעולם אין לסמוך על צורת ההווה או שם הפועל! בבגרות ינסו לבלבל אתכם עם 'ממלא' ו'מרצה'. הפתרון: העברה לעבר נסתר (הוא אתמול). הִרְצָה -> ה' = נל\"י/ה. הִמְצִיא -> א' = נל\"א." },
                    { title: "חריגי משמעות (משמעויות תאומות)", content: "שימו לב: קיימים שורשים בנל\"א שדומים לנל\"י/ה אבל משמעותם שונה. ח-ט-א (עשה חטא) לעומת ח-ט-ה (ניקה/חיטא). מ-צ-א (מצא אבדה) לעומת מ-צ-ה (מיצה את הדין)." },
                    { title: "כתיב ייחודי בבניין נפעל", content: "בבניין נפעל בעבר/הווה, פעלים בנל\"א מקבלים קמץ לפני הא' (נִמְצָא). בעתיד הם יקבלו צירה (יִמָּצֵא). זהו סמן זיהוי קלאסי במבחנים." }
                ],
                conjugations: [
                    { root: "ק-ר-א", past: "קָרָא", present: "קוֹרֵא", future: "יִקְרָא", infinitive: "לִקְרֹא" },
                    { root: "מ-צ-א (נפעל)", past: "נִמְצָא", present: "נִמְצָא", future: "יִמָּצֵא", infinitive: "לְהִמָּצֵא" },
                    { root: "ב-ר-א (הפעיל)", past: "הִבְרִיא", present: "מַבְרִיא", future: "יַבְרִיא", infinitive: "לְהַבְרִיא" }
                ],
                quiz: [
                    // EASY (10)
                    { difficulty: "easy", question: "הפועל 'מַמְצִיא' שייך לגזרת נל\"א כי בעבר נסתר הוא מנוסח כ:", options: [{text:"הִמְצִיא", isCorrect:true, rationale:"צורת העבר חושפת את ה-א'."}, {text:"מָצָא", isCorrect:false}, {text:"נִמְצָא", isCorrect:false}] },
                    { difficulty: "easy", question: "איזו צורה מציגה א' נחה?", options: [{text:"קָרָאתִי", isCorrect:true, rationale:"ה-א' סוגרת הברה."}, {text:"יִקְרְאוּ", isCorrect:false}, {text:"קוֹרְאִים", isCorrect:false}] },
                    { difficulty: "easy", question: "מהו השורש של המילה 'תַּבְרוּאָה'?", options: [{text:"ב-ר-א", isCorrect:true, rationale:"מהפועל להבריא."}, {text:"ת-ב-ר", isCorrect:false}, {text:"ב-ר-ה", isCorrect:false}] },
                    { difficulty: "easy", question: "איזה פועל שייך לגזרת נל\"א?", options: [{text:"הִקְפִּיא", isCorrect:true, rationale:"מסתיים באות א' -> ק-פ-א."}, {text:"הִשְׁקָה", isCorrect:false}, {text:"הִגִּיעַ", isCorrect:false}] },
                    { difficulty: "easy", question: "השלם: האות א' בשורש י-צ-א מוגדרת כ:", options: [{text:"ל' הפועל", isCorrect:true, rationale:"היא האות השלישית בשורש."}, {text:"פ' הפועל", isCorrect:false}, {text:"ע' הפועל", isCorrect:false}] },
                    { difficulty: "easy", question: "מה השורש של הפועל שָׁנָא?", options: [{text:"ש-נ-א", isCorrect:true, rationale:"מסיים בא'."}, {text:"ש-נ-ה", isCorrect:false}, {text:"ש-ו-נ", isCorrect:false}] },
                    { difficulty: "easy", question: "מה השורש של נִמְצָא?", options: [{text:"מ-צ-א", isCorrect:true, rationale:"בניין נפעל."}, {text:"נ-מ-צ", isCorrect:false}, {text:"מ-צ-ה", isCorrect:false}] },
                    { difficulty: "easy", question: "איך אומרים בעבר גוף אנחנו: ק-ר-א?", options: [{text:"קָרָאנוּ", isCorrect:true, rationale:"בלי נפילת א'."}, {text:"קָרַנּוּ", isCorrect:false}, {text:"קָרִינוּ", isCorrect:false}] },
                    { difficulty: "easy", question: "איזה מהבאים הוא שם פועל של בניין קל בנל\"א?", options: [{text:"לִקְרֹא", isCorrect:true, rationale:"כמו לשמור."}, {text:"לְהַקְרִיא", isCorrect:false}, {text:"לִקְרִיאָה", isCorrect:false}] },
                    { difficulty: "easy", question: "מהי האות המזהה את גזרת נל\"א?", options: [{text:"האות א' בסוף השורש", isCorrect:true, rationale:"נחי ל' א'."}, {text:"האות ה' בסוף", isCorrect:false}, {text:"האות י' בהתחלה", isCorrect:false}] },
                    // MEDIUM (10)
                    { difficulty: "medium", question: "לפניך המשפט: 'הוא יִמָּצֵא אשם בדין'. מהו בניין הפועל?", options: [{text:"נפעל", isCorrect:true, rationale:"התחילית יִ והדגש בפ'."}, {text:"פיעל", isCorrect:false}, {text:"התפעל", isCorrect:false}] },
                    { difficulty: "medium", question: "מה השורש של: 'הכוחות נֶחְבְּאוּ במערה'?", options: [{text:"ח-ב-א", isCorrect:true, rationale:"נפעל עבר."}, {text:"ח-ב-ה", isCorrect:false}, {text:"נ-ח-ב", isCorrect:false}] },
                    { difficulty: "medium", question: "מהי הצורה התקנית בעתיד 'הן' ק-ר-א (קל)?", options: [{text:"תִּקְרֶאנָה", isCorrect:true, rationale:"סיומת 'נָה' עם א' נחה."}, {text:"תִּקְרֶינָה", isCorrect:false}, {text:"יִקְרְאוּ", isCorrect:false}] },
                    { difficulty: "medium", question: "מה השורש של המילה 'מִקְרָא'?", options: [{text:"ק-ר-א", isCorrect:true, rationale:"משקל מִקְטָל."}, {text:"מ-ק-ר", isCorrect:false}, {text:"ק-ר-ה", isCorrect:false}] },
                    { difficulty: "medium", question: "מהי צורת העתיד המדויקת של ל-ק-א (נפעל)?", options: [{text:"יִלָּקֵא", isCorrect:true, rationale:"דגש בל' וצירה בסוף (כמו ימצא)."}, {text:"יִלָּקָא", isCorrect:false}, {text:"יִלָּקֶה", isCorrect:false}] },
                    { difficulty: "medium", question: "איזה משפט מכיל פועל נל\"א?", options: [{text:"הוא התפלא מאוד.", isCorrect:true, rationale:"שורש פ-ל-א."}, {text:"הוא התגלה פתאום.", isCorrect:false}, {text:"הוא התכונן לזה.", isCorrect:false}] },
                    { difficulty: "medium", question: "הפועל מְבַטֵּא שייך לבניין:", options: [{text:"פיעל", isCorrect:true, rationale:"מ' בשווא ודגש ב-ט'."}, {text:"הפעיל", isCorrect:false}, {text:"פועל", isCorrect:false}] },
                    { difficulty: "medium", question: "מהו שם הפעולה של ק-ר-א בבניין קל?", options: [{text:"קְרִיאָה", isCorrect:true, rationale:"משקל קטילה."}, {text:"מִקְרָא", isCorrect:false}, {text:"הַקְרָאָה", isCorrect:false}] },
                    { difficulty: "medium", question: "בחר את הצורה השגויה:", options: [{text:"מָלֵאתִי", isCorrect:true, rationale:"הצורה היא מִלֵּאתִי (פיעל) או מָלֵאתִי אבל נכתב לרוב מָלָאתִי בקל."}, {text:"מָצָאתִי", isCorrect:false}, {text:"קָרָאתִי", isCorrect:false}] },
                    { difficulty: "medium", question: "השורש ר-פ-א בבניין פיעל עבר (הוא):", options: [{text:"רִפֵּא", isCorrect:true, rationale:"דגש ב-פ', א' נחה."}, {text:"רָפָא", isCorrect:false}, {text:"הִרְפִּיא", isCorrect:false}] },
                    // HARD (10)
                    { difficulty: "hard", question: "באיזה פועל ה-א' עיצורית ולא נחה?", options: [{text:"צָמְאוּ", isCorrect:true, rationale:"לפני 'ו', ה-א' חטופה ונהגית."}, {text:"מִלֵּאתֶם", isCorrect:false}, {text:"נִמְצָאת", isCorrect:false}] },

                text: `שאלת יחסי הגומלין בין הטכנולוגיה לחברה מעסיקה סוציולוגים ופילוסופים למעלה ממאה שנים. גישה אחת, המכונה "דטרמיניזם טכנולוגי", גורסת כי ההתפתחות הטכנולוגית היא הכוח המניע הבלעדי של ההיסטוריה. על פי גישה זו, ממציאים ממציאים כלים (כמו הדפוס, מנוע הקיטור או האינטרנט) מתוך תהליך מדעי אובייקטיבי, וכלים אלו בתורם "מכתיבים" לחברה כיצד להתנהג, לשנות את המבנה הכלכלי שלה ולעצב את תרבותה מחדש. האדם, לפי תפיסה רדיקלית זו, הוא כלי שרת בידי הקידמה הטכנולוגית שאינה ניתנת לעצירה.<br><br>מנגד, ניצבת גישת ה"הבנייה החברתית של הטכנולוגיה" (SCOT). חוקרי גישה זו הופכים את המשוואה וטוענים כי החברה היא זו שמפסלת את הטכנולוגיה. לטענתם, טכנולוגיה לעולם אינה מתפתחת בוואקום; היא תוצר של כוחות פוליטיים, צרכים כלכליים, וקונפליקטים בין קבוצות אינטרס (Stakeholders) שונות. המצאה תצליח ותוטמע בחברה רק אם היא משרתת אידיאולוגיה או צורך חברתי של קבוצה הגמונית.<br><br>דוגמה קלאסית להמחשת הוויכוח היא המכונית הפרטית. הדטרמיניסט יטען שהמצאת המנוע הובילה בהכרח להתפתחות הפרברים ולפירוק הקהילה הצפופה. לעומתו, חוקר ההבנייה החברתית יוכיח כי לובי מפעלי הרכב ותעשיית הנפט הם אלו שלחצו ועיצבו מראש מדיניות ממשלתית לסלילת כבישים על חשבון רכבות, כלומר - הפוליטיקה עיצבה את ניצחון המכונית.`,

            { difficulty: "mega-degree", category: "אקדמיה", question: "האות 'ת' במילה 'הִתְחַלָּה':", options: [{text:"תבנית המשקל (התקטלה)", isCorrect:true, rationale:"שורש ח-ל-ל, משקל התפעלות/התקטלה."}, {text:"שורש", isCorrect:false}, {text:"אית\"ן", isCorrect:false}] },
            { difficulty: "mega-degree", category: "אקדמיה", question: "מִיסוּד (שורש ומשקל):", options: [{text:"י-ס-ד, פיעל", isCorrect:true, rationale:"י' בשווא נשמעת כמו תנועת אי."}, {text:"מ-ס-ד, פעל", isCorrect:false}, {text:"י-ס-ד, הפעיל", isCorrect:false}] },
            { difficulty: "mega-degree", category: "אקדמיה", question: "בניין המילה מֻשְׁגֶּבֶת:", options: [{text:"הופעל", isCorrect:true, rationale:"תחילית מֻ, הופעל הווה (שגב)."}, {text:"פועל", isCorrect:false}, {text:"הפעיל", isCorrect:false}] },
            { difficulty: "mega-degree", category: "אקדמיה", question: "הידמות מלאה מתקיימת ב:", options: [{text:"יִפֹּל", isCorrect:true, rationale:"נ+פ -> פּ."}, {text:"יִשְׁמֹר", isCorrect:false}, {text:"יֵרֵד", isCorrect:false}] },
            { difficulty: "mega-degree", category: "אקדמיה", question: "קרא את המספר '13' בזכר נסמך:", options: [{text:"שְׁלוֹשָׁה עָשָׂר (אין נסמך מיוחד)", isCorrect:true, rationale:"ב-11 עד 19 אין צורת נסמך שונה מזכר רגיל."}, {text:"שְׁלֹשֶׁת עָשָׂר", isCorrect:false}, {text:"שְׁלוֹשׁ עֶשְׂרֵה", isCorrect:false}] },
            { difficulty: "mega-degree", category: "אקדמיה", question: "צורת העבר (היא) של שורש ת-מ-מ (כפולים):", options: [{text:"תַּמָּה", isCorrect:true}, {text:"תָּמְמָה", isCorrect:false}, {text:"תּוֹמָה", isCorrect:false}] },
            { difficulty: "mega-degree", category: "אקדמיה", question: "מַחְשֵׁף (מכשיר) נוצר מ:", options: [{text:"שורש ח-ש-פ ומשקל מַקְטֵל", isCorrect:true}, {text:"בסיס חשף + ף", isCorrect:false}, {text:"הלחם בסיסים", isCorrect:false}] },
            { difficulty: "mega-degree", category: "אקדמיה", question: "מה השורש של הֵעִיד?", options: [{text:"ע-ו-ד", isCorrect:true, rationale:"נעו\"י בהפעיל (העיד - עדות)."}, {text:"י-ע-ד", isCorrect:false}, {text:"ע-י-ד", isCorrect:false}] },
            { difficulty: "mega-degree", category: "אקדמיה", question: "כיצד אומרים 3,000 שקלים?", options: [{text:"שְׁלֹשֶׁת אֲלָפִים שקלים", isCorrect:true}, {text:"שְׁלוֹשָׁה אֲלָפִים", isCorrect:false}, {text:"שָׁלוֹשׁ אֲלָפִים", isCorrect:false}] }
        ];

        // ==========================================
        // 5. CORE UI FUNCTIONS
        // ==========================================
        
        function buildNavigation() {
            const nav = document.getElementById('nav-tabs'); nav.innerHTML = '';
            nav.appendChild(createNavBtn('dashboard', '🏠', 'אזור אישי'));
            
            // Verbs Accordion
            const gzarotKeys = ['nla', 'nliy', 'navy', 'npiv', 'hpn'];
            const gzarotCat = document.createElement('button');
            gzarotCat.className = `w-full text-right px-4 py-3 text-lg font-bold transition-all rounded-lg flex justify-between items-center text-gray-700 hover:bg-gray-100 hover:text-primary mb-1 focus:outline-none`;
            gzarotCat.innerHTML = `<div class="flex items-center gap-3"><span class="text-2xl w-8 text-center">🧠</span> <span>גזרות הפועל</span></div> <span id="gzarot-icon" class="text-sm">▼</span>`;
            gzarotCat.onclick = toggleGzarotMenu; nav.appendChild(gzarotCat);

            const gzarotSub = document.createElement('div'); gzarotSub.id = 'gzarot-submenu'; gzarotSub.className = 'hidden flex-col pr-8 pl-2 space-y-1 mb-2 border-r-4 border-blue-50 mr-4';
            gzarotKeys.forEach(k => gzarotSub.appendChild(createNavBtn(appData[k].id, appData[k].icon, appData[k].label, true)));
            nav.appendChild(gzarotSub);

            ['numbers', 'noun_formation'].forEach(k => nav.appendChild(createNavBtn(appData[k].id, appData[k].icon, appData[k].label)));
            
            nav.appendChild(createNavBtn('reading-hub', '📚', 'הבנת הנקרא'));
            
            const mega = createNavBtn('mega-quiz', '🔥', 'מבחן מסכם (Master)'); mega.classList.add('bg-red-50', 'text-red-700', 'border', 'border-red-200', 'mt-4'); nav.appendChild(mega);
        }

        function createNavBtn(id, icon, label, isSub = false) {
            const btn = document.createElement('button'); btn.id = `nav-${id}`;
            const pad = isSub ? 'px-3 py-2 text-base' : 'px-4 py-3 text-lg mb-1';
            btn.className = `w-full text-right ${pad} font-medium rounded-lg flex items-center gap-3 text-gray-600 hover:bg-gray-100 hover:text-primary focus:outline-none`;
            btn.innerHTML = `<span class="${isSub?'text-xl':'text-2xl'} w-8 text-center">${icon}</span> <span>${label}</span>`;
            btn.onclick = () => { loadModule(id); closeSidebar(); }; return btn;
        }

        function toggleGzarotMenu() { const s = document.getElementById('gzarot-submenu'); const i = document.getElementById('gzarot-icon'); s.classList.toggle('hidden'); i.classList.toggle('rotate-180'); }

        function loadModule(moduleId) {
            currentModuleId = moduleId;
            if(megaQuizTimer) clearInterval(megaQuizTimer);
            
            document.querySelectorAll('#nav-tabs button').forEach(b => b.classList.remove('active-tab'));
            const activeBtn = document.getElementById(`nav-${moduleId}`); if(activeBtn) activeBtn.classList.add('active-tab');

            const content = document.getElementById('main-content'); content.innerHTML = ''; 

            if (moduleId === 'dashboard') { content.appendChild(renderDashboard()); initDashboardChart(); }
            else if (moduleId === 'reading-hub') content.appendChild(renderReadingIntro());
            else if (moduleId.startsWith('read-')) content.appendChild(renderReadingArticle(moduleId));
            else if (moduleId === 'mega-quiz') content.appendChild(renderMegaQuizIntro());
            else content.appendChild(renderGzaraModule(appData[moduleId]));

            document.querySelectorAll('.fade-in-up').forEach(el => { el.classList.remove('fade-in-up'); void el.offsetWidth; el.classList.add('fade-in-up'); });
        }

        // ==========================================
        // 6. DASHBOARD
        // ==========================================
        function renderDashboard() {
            const div = document.createElement('div'); div.className = 'fade-in-up space-y-8';
            const rank = getCurrentRank(); const nextRank = getNextRank();
            
            let xpProgressHtml = nextRank ? `
                <div class="mt-4">
                    <div class="flex justify-between text-sm text-gray-500 mb-1"><span>${userProgress.totalXP} XP</span><span>עוד ${nextRank.threshold - userProgress.totalXP} XP לדרגת ${nextRank.title}</span></div>
                    <div class="xp-bar-container"><div class="xp-bar-fill" style="width: ${Math.min(100, Math.round(((userProgress.totalXP - rank.threshold) / (nextRank.threshold - rank.threshold)) * 100))}%"></div></div>
                </div>` : `<div class="mt-4 text-center font-bold text-secondary">הגעת לדרגה המקסימלית! 👑 (${userProgress.totalXP} XP)</div>`;

            let readingCompleted = 0; let totalReading = Object.keys(readingData).length;
            if(userProgress.reading) { Object.values(userProgress.reading).forEach(r => { if(r.score > 0) readingCompleted++; }); }

            div.innerHTML = `
                <div class="text-center space-y-4 mb-10"><h1 class="text-4xl md:text-5xl font-extrabold text-gray-900">אזור ההתקדמות האישי</h1></div>
                
                <div class="bg-white p-8 rounded-3xl shadow-lg border border-yellow-100 flex flex-col md:flex-row items-center gap-8 mb-8">
                    <div class="text-8xl bg-blue-50 p-4 rounded-full shadow-inner">${rank.icon}</div>
                    <div class="flex-grow w-full text-center md:text-right">
                        <h2 class="text-3xl font-bold text-primary mb-2">דרגה נוכחית: ${rank.title}</h2>
                        <p class="text-gray-600">השלם בחנים ואת המבחן המסכם כדי לצבור נקודות ניסיון (XP) ולעלות בדרגות.</p>
                        ${xpProgressHtml}
                    </div>
                    <div class="text-center bg-gray-50 p-6 rounded-2xl border border-gray-200 min-w-[200px]">
                        <div class="text-sm text-gray-500 mb-1">שיא במבחן מסכם (Master)</div>
                        <div class="text-4xl font-extrabold text-red-500">${userProgress.megaQuizHighScore} <span class="text-lg">נק'</span></div>
                    </div>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                    <div class="bg-white p-6 rounded-3xl shadow-md border border-gray-100">
                        <h3 class="text-2xl font-bold text-gray-800 mb-6 border-b pb-4">השלמת בחני דקדוק (%)</h3>
                        <div class="dashboard-chart-container mb-6"><canvas id="dashboardChart"></canvas></div>
                    </div>
                    
                    <div class="space-y-6">
                        <div class="bg-white p-6 rounded-3xl shadow-md border border-gray-100 grid grid-cols-1 sm:grid-cols-2 gap-4 content-start">
                            ${Object.values(appData).map(mod => {
                                const prog = userProgress.modules[mod.id] || {};
                                // Calculate max possible out of 30 items per module (10 easy, 10 med, 10 hard)
                                const currentScore = (prog.easy?.score||0) + (prog.medium?.score||0) + (prog.hard?.score||0);
                                const totalPossible = 30; // 10 per difficulty
                                const percent = totalPossible > 0 ? Math.round((currentScore / totalPossible) * 100) : 0;
                                const colorClass = percent === 100 ? 'text-green-600' : (percent > 0 ? 'text-secondary' : 'text-gray-400');
                                const bgClass = percent === 100 ? 'bg-green-50 border-green-200' : 'bg-gray-50 border-gray-100';
                                return `<div class="p-4 rounded-xl border cursor-pointer hover:shadow-md transition ${bgClass}" onclick="loadModule('${mod.id}')">
                                        <div class="font-bold text-gray-800">${mod.icon} ${mod.label}</div>
                                        <div class="text-lg font-bold ${colorClass}">${percent}%</div>
                                    </div>`;
                            }).join('')}
                        </div>
                        
                        <div class="bg-green-50 p-6 rounded-3xl shadow-md border border-green-200 text-center cursor-pointer hover:bg-green-100 transition" onclick="loadModule('reading-hub')">
                            <h3 class="text-xl font-bold text-green-800 mb-2">📚 הבנת הנקרא</h3>
                            <p class="text-green-700 font-medium">מאמרים שהושלמו: ${readingCompleted} / ${totalReading}</p>
                        </div>
                    </div>
                </div>`;
            return div;
        }

        function initDashboardChart() {
            const ctx = document.getElementById('dashboardChart').getContext('2d');
            if (dashboardChartInstance) dashboardChartInstance.destroy();
            const labels = []; const dataScores = [];
            Object.values(appData).forEach(mod => {
                labels.push(mod.label);
                const p = userProgress.modules[mod.id] || {};
                const currentScore = (p.easy?.score||0) + (p.medium?.score||0) + (p.hard?.score||0);
                const total = 30; // 10 per difficulty
                dataScores.push((currentScore / total) * 100);
            });
            dashboardChartInstance = new Chart(ctx, {
                type: 'bar', data: { labels: labels, datasets: [{ label: 'אחוזי הצלחה (%)', data: dataScores, backgroundColor: '#1e3a8a', borderRadius: 6 }] },
                options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true, max: 100 } }, plugins: { legend: { display: false } } }
            });
        }

        // ==========================================
        // 7. READING COMPREHENSION
        // ==========================================
        function renderReadingIntro() {
            const div = document.createElement('div'); div.className = 'fade-in-up space-y-8';
            
            let articlesHtml = Object.values(readingData).map(art => {
                let prog = userProgress.reading && userProgress.reading[art.id];
                let statusHtml = prog ? `<span class="bg-green-100 text-green-800 text-xs px-2 py-1 rounded-full font-bold ml-2">הושלם (${prog.score}/${prog.total})</span>` : `<span class="bg-yellow-100 text-yellow-800 text-xs px-2 py-1 rounded-full font-bold ml-2">חדש</span>`;
                let diffLabel = art.difficulty === 'easy' ? 'קל' : (art.difficulty === 'medium' ? 'בינוני' : 'אקדמי');
                let diffColor = art.difficulty === 'easy' ? 'text-blue-600 bg-blue-50' : (art.difficulty === 'medium' ? 'text-orange-600 bg-orange-50' : 'text-red-600 bg-red-50');
                
                return `
                <div onclick="loadModule('${art.id}')" class="bg-white p-8 rounded-3xl shadow-md border border-gray-200 cursor-pointer hover:shadow-xl hover:-translate-y-1 transition-all group flex flex-col justify-between">
                    <div>
                        <div class="flex justify-between items-start mb-4">
                            <div class="text-6xl group-hover:scale-110 transition-transform">${art.icon}</div>
                            <div class="text-xs font-bold px-2 py-1 rounded-md ${diffColor}">${diffLabel}</div>
                        </div>
                        <h3 class="text-2xl font-extrabold text-gray-800 mb-2">${art.title}</h3>
                        <p class="text-gray-500 mb-6 line-clamp-2">${art.text.substring(0, 80)}...</p>
                    </div>
                    <div class="flex justify-between items-center border-t pt-4">
                        <span class="text-primary font-bold group-hover:underline">קרא ולמד ⬅️</span>
                        ${statusHtml}
                    </div>
                </div>`;
            }).join('');

            div.innerHTML = `
                <div class="text-center space-y-4 mb-10">
                    <div class="inline-block p-4 bg-green-100 rounded-full mb-2"><span class="text-5xl">📚</span></div>
                    <h1 class="text-4xl md:text-5xl font-extrabold text-gray-900">הבנת הנקרא</h1>
                    <p class="text-xl text-gray-600 max-w-2xl mx-auto">9 מאמרים מקיפים (כולל רמה אקדמית). המאמרים ארוכים ודורשים קריאה מעמיקה. (50XP לכל מאמר שמושלם נכונה).</p>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                    ${articlesHtml}
                </div>
            `;
            return div;
        }

        function renderReadingArticle(articleId) {
            currentReadingId = articleId;
            const data = readingData[articleId];
            const div = document.createElement('div');
            div.className = 'fade-in-up';
            
            div.innerHTML = `
                <div class="mb-6 flex justify-between items-center">
                    <button onclick="loadModule('reading-hub')" class="text-gray-500 hover:text-primary font-bold flex items-center gap-1 transition-colors focus:outline-none">
                        <span>➡️</span> חזרה לרשימת המאמרים
                    </button>
                    <div class="bg-green-100 text-green-800 px-4 py-1 rounded-full font-bold text-sm border border-green-200">50XP לשאלה מושלמת</div>
                </div>
                
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-10 items-start">
                    <div class="bg-[#fdfbf7] p-8 rounded-3xl shadow-md border border-[#e2d8c3] sticky-article">
                        <div class="text-center mb-8 border-b-2 border-[#e2d8c3] pb-6">
                            <span class="text-5xl block mb-4">${data.icon}</span>
                            <h2 class="text-3xl font-extrabold text-gray-900 leading-tight">${data.title}</h2>
                        </div>
                        <div class="article-text">
                            ${data.text}
                        </div>
                    </div>
                    <div class="w-full" id="reading-quiz-container">
                        ${getQuizHTML(`בחינת הבנה`, 'reading')}
                    </div>
                </div>
            `;

            setTimeout(() => {
                currentQuizData = data.quiz;
                document.getElementById('quiz-intro').classList.add('hidden');
                document.getElementById('quiz-layout').classList.remove('hidden');
                resetQuiz();
            }, 50);

            return div;
        }

        // ==========================================
        // 8. GZARA & GRAMMAR UI RENDERER
        // ==========================================
        function renderGzaraModule(data) {
            const container = document.createElement('div'); container.className = 'space-y-16';
            container.innerHTML += `<section class="text-center space-y-4 pt-4 pb-8 border-b-2 border-gray-100 fade-in-up"><div class="text-6xl mb-4">${data.icon}</div><h1 class="text-4xl md:text-6xl font-extrabold text-gray-900 tracking-tight">${data.title}</h1><p class="text-xl md:text-2xl text-primary font-semibold max-w-3xl mx-auto leading-relaxed">${data.intro}</p></section>`;
            
            if(data.concepts && data.concepts.length > 0) {
                let conceptsHtml = data.concepts.map(c => `<div class="concept-card bg-white rounded-2xl p-6 shadow-sm border border-gray-100 cursor-pointer hover:shadow-lg hover:border-blue-200 transition-all duration-300" onclick="toggleConcept(this)"><div class="flex justify-between items-center"><h3 class="text-xl md:text-2xl font-bold text-primary">${c.title}</h3><span class="text-gray-400 text-3xl toggle-icon transition-transform font-mono font-bold leading-none">+</span></div><div class="concept-content hidden mt-4 text-gray-700 border-t border-gray-100 pt-4 leading-relaxed text-lg">${c.content}</div></div>`).join('');
                container.innerHTML += `<section class="space-y-6 fade-in-up"><div class="text-right border-r-4 border-secondary pr-4"><h2 class="text-3xl font-bold text-gray-900">מושגי מפתח וכללי ברזל (בגרות)</h2></div><div class="grid grid-cols-1 md:grid-cols-2 gap-6">${conceptsHtml}</div></section>`;
            }
            
            if(data.conjugations && data.conjugations.length > 0) {
                let th1 = "שורש", col2 = "עבר (הוא)", col3 = "הווה", col4 = "עתיד", col5 = "שם פועל";
                if (data.id === "numbers") { th1="מספר"; col2="זכר"; col3="נקבה"; col4="נסמך זכר"; col5="נסמך נקבה"; }
                if (data.id === "noun_formation") { th1="דרך תצורה"; col2="דוגמה 1"; col3="דוגמה 2"; col4="דוגמה 3"; col5="דוגמה 4"; }
                
                let tableRows = data.conjugations.map((conj, idx) => `<tr class="table-cell-hover border-b border-gray-100 ${idx%2===0?'bg-white':'bg-gray-50'}"><td class="p-4 font-extrabold text-primary border-l border-gray-200">${conj.root}</td><td class="p-4 border-l border-gray-200"><button class="audio-btn" onclick="playAudio('${conj.past}')">🔊</button> ${conj.past}</td><td class="p-4 border-l border-gray-200"><button class="audio-btn" onclick="playAudio('${conj.present}')">🔊</button> ${conj.present}</td><td class="p-4 border-l border-gray-200"><button class="audio-btn" onclick="playAudio('${conj.future}')">🔊</button> ${conj.future}</td><td class="p-4 font-medium"><button class="audio-btn" onclick="playAudio('${conj.infinitive}')">🔊</button> ${conj.infinitive}</td></tr>`).join('');
                container.innerHTML += `<section class="space-y-6 fade-in-up bg-white p-6 rounded-3xl shadow-sm border border-gray-200"><div class="text-right border-r-4 border-accent pr-4 mb-6"><h2 class="text-3xl font-bold text-gray-900">לוח דוגמאות ונטיות</h2></div><div class="overflow-x-auto rounded-xl border border-gray-200 shadow-inner"><table class="w-full text-right border-collapse min-w-[700px]"><thead><tr class="bg-gray-100 text-gray-700"><th class="p-4 font-bold border-b border-l border-gray-200">${th1}</th><th class="p-4 font-bold border-b border-l border-gray-200">${col2}</th><th class="p-4 font-bold border-b border-l border-gray-200">${col3}</th><th class="p-4 font-bold border-b border-l border-gray-200">${col4}</th><th class="p-4 font-bold border-b border-gray-200">${col5}</th></tr></thead><tbody class="text-xl font-medium">${tableRows}</tbody></table></div></section>`;
            }

            container.innerHTML += getQuizHTML(`תרגול עיוני: ${data.label}`, 'standard'); 
            return container;
        }

        // ==========================================
        // 9. QUIZ ENGINE
        // ==========================================
        function getQuizHTML(title, mode) {
            let themeClass = 'from-blue-50 to-indigo-50 border-blue-200'; let btnClass = 'bg-primary hover:bg-blue-800';
            if (mode === 'mega') { themeClass = 'from-red-50 to-orange-50 border-red-200'; btnClass = 'bg-red-600 hover:bg-red-800'; }
            if (mode === 'reading') { themeClass = 'from-green-50 to-emerald-50 border-green-200'; btnClass = 'bg-emerald-600 hover:bg-emerald-800'; }
            
            let introHtml = mode === 'standard' ? `<div id="quiz-intro" class="text-center py-12 px-4"><h3 class="text-3xl font-bold mb-8 text-gray-800">בחר רמת קושי לתרגול:</h3><div class="flex flex-col sm:flex-row justify-center gap-4 max-w-2xl mx-auto"><button onclick="startStandardQuiz('easy')" class="flex-1 bg-white border-2 border-blue-200 text-blue-700 p-4 rounded-xl font-bold hover:bg-blue-50 transition shadow-sm text-lg">רמה בסיסית<br><span class="text-sm font-normal">20XP לשאלה</span></button><button onclick="startStandardQuiz('medium')" class="flex-1 bg-white border-2 border-indigo-300 text-indigo-800 p-4 rounded-xl font-bold hover:bg-indigo-50 transition shadow-sm text-lg">רמת בגרות<br><span class="text-sm font-normal">40XP לשאלה</span></button><button onclick="startStandardQuiz('hard')" class="flex-1 bg-white border-2 border-purple-400 text-purple-900 p-4 rounded-xl font-bold hover:bg-purple-50 transition shadow-sm text-lg">רמת אתגר/אקדמיה<br><span class="text-sm font-normal">60XP לשאלה</span></button></div></div>` : `<div id="quiz-intro" class="hidden"></div>`; 

            return `
                <section id="quiz-section-wrapper" class="space-y-6 bg-gradient-to-br ${themeClass} p-6 md:p-10 rounded-3xl border shadow-md fade-in-up w-full">
                    <div class="flex justify-between items-center mb-8"><div class="text-right border-r-4 ${mode==='mega'?'border-red-600':(mode==='reading'?'border-emerald-600':'border-primary')} pr-4"><h2 class="text-2xl md:text-3xl font-bold text-gray-900">${title}</h2></div><div id="quiz-header-extra"></div></div>
                    <div class="bg-white rounded-2xl shadow-lg border border-gray-200 overflow-hidden relative" id="quiz-container-inner">
                        ${introHtml}
                        <div id="quiz-layout" class="hidden">
                            <div class="bg-gray-100 border-b border-gray-200 px-6 py-4 flex justify-between items-center"><span id="quiz-progress" class="text-base font-semibold text-gray-600">שאלה 1</span><span id="quiz-score" class="text-base font-bold text-white ${mode==='mega'?'bg-red-600':(mode==='reading'?'bg-emerald-600':'bg-primary')} px-4 py-1 rounded-full shadow-sm">ניקוד: 0</span></div>
                            <div id="quiz-body" class="p-6 md:p-10 min-h-[350px] flex flex-col justify-center"><p id="question-source" class="text-sm font-bold text-secondary mb-2 hidden"></p><h3 id="question-text" class="text-xl md:text-2xl font-bold text-gray-800 mb-8 leading-relaxed"></h3><div id="options-container" class="space-y-4"></div><div id="feedback-container" class="hidden mt-8 p-6 rounded-xl transition-all border-l-8"><p id="feedback-text" class="text-lg font-medium leading-relaxed"></p></div><div class="mt-10 flex justify-end"><button id="next-btn" class="hidden text-white px-8 py-4 rounded-xl font-bold transition-colors shadow-md text-lg ${btnClass}" onclick="nextQuestion()">לשאלה הבאה ⬅️</button></div></div>
                            <div id="quiz-results" class="hidden p-6 md:p-12 text-center min-h-[350px] flex flex-col justify-center items-center"><div class="text-6xl mb-4">🏆</div><h3 class="text-3xl md:text-4xl font-extrabold text-gray-900 mb-4">סיכום התרגול</h3><p id="final-score-text" class="text-xl md:text-2xl text-gray-600 mb-8 font-semibold"></p><div class="chart-container w-full"><canvas id="resultsChart"></canvas></div><div class="mt-12 flex flex-wrap justify-center gap-4">${mode === 'mega' ? `<button onclick="loadModule('mega-quiz')" class="bg-red-500 text-white px-8 py-4 rounded-xl font-bold hover:bg-red-700 transition-colors shadow-md text-lg">🔄 מבחן חדש</button>` : mode === 'reading' ? `<button onclick="loadModule('${currentReadingId}')" class="bg-emerald-500 text-white px-8 py-4 rounded-xl font-bold hover:bg-emerald-700 transition-colors shadow-md text-lg">🔄 קרא שוב</button>` : `<button onclick="loadModule('${currentModuleId}')" class="bg-secondary text-white px-8 py-4 rounded-xl font-bold hover:bg-yellow-600 transition-colors shadow-md text-lg">🔄 תרגל שוב</button>`} <button onclick="loadModule('dashboard')" class="bg-primary text-white px-8 py-4 rounded-xl font-bold hover:bg-blue-800 transition-colors shadow-md text-lg">🏠 חזור למאגר</button></div></div>
                        </div>
                    </div>
                </section>
            `;
        }

        function toggleConcept(cardElement) {
            const content = cardElement.querySelector('.concept-content'); const icon = cardElement.querySelector('.toggle-icon');
            if (content.classList.contains('hidden')) { content.classList.remove('hidden'); icon.textContent = '−'; icon.classList.add('text-secondary', 'rotate-180'); cardElement.classList.add('ring-2', 'ring-blue-100'); } 
            else { content.classList.add('hidden'); icon.textContent = '+'; icon.classList.remove('text-secondary', 'rotate-180'); cardElement.classList.remove('ring-2', 'ring-blue-100'); }
        }

        function startStandardQuiz(diff) {
            currentDifficulty = diff; isReadingQuiz = false; isMegaQuiz = false;
            // Always pull exactly 10 questions for Standard quizzes
            let pool = appData[currentModuleId].quiz.filter(q => q.difficulty === diff);
            currentQuizData = pool.sort(() => 0.5 - Math.random()).slice(0, 10);
            
            document.getElementById('quiz-intro').classList.add('hidden');
            document.getElementById('quiz-layout').classList.remove('hidden');
            resetQuiz();
        }

        function resetQuiz() {
            currentQuestionIndex = 0; score = 0;
            document.getElementById('quiz-results').classList.add('hidden');
            document.getElementById('quiz-body').classList.remove('hidden');
            document.getElementById('next-btn').textContent = 'לשאלה הבאה ⬅️';
            loadQuestion();
        }

        function loadQuestion() {
            hasAnsweredCurrent = false;
            document.getElementById('feedback-container').classList.add('hidden');
            document.getElementById('next-btn').classList.add('hidden');
            const optionsContainer = document.getElementById('options-container'); optionsContainer.innerHTML = '';
            
            if(currentQuizData.length === 0) {
                optionsContainer.innerHTML = "<p>אין שאלות ברמה זו כרגע.</p>"; return;
            }

            const currentQ = currentQuizData[currentQuestionIndex];
            
            document.getElementById('quiz-progress').textContent = `שאלה ${currentQuestionIndex + 1} מתוך ${currentQuizData.length}`;
            document.getElementById('quiz-score').textContent = `ניקוד: ${score}`;
            
            if(isMegaQuiz && currentQ.category) {
                const srcEl = document.getElementById('question-source'); srcEl.textContent = `נושא: ${currentQ.category}`; srcEl.classList.remove('hidden');
            } else {
                document.getElementById('question-source').classList.add('hidden');
            }

            document.getElementById('question-text').innerHTML = currentQ.question;
            const shuffledOptions = [...currentQ.options].sort(() => 0.5 - Math.random());

            shuffledOptions.forEach((option, index) => {
                const btn = document.createElement('button');
                btn.className = 'w-full text-right p-4 rounded-xl border-2 border-gray-200 bg-white hover:border-primary hover:bg-blue-50 hover:shadow-md transition-all focus:outline-none text-lg group flex items-start gap-3';
                btn.innerHTML = `<span class="inline-block flex-shrink-0 w-6 h-6 rounded-full border-2 border-gray-300 mt-1 flex items-center justify-center text-xs group-hover:border-primary transition-colors"></span> <span class="font-semibold text-gray-800">${option.text}</span>`;
                btn.onclick = () => selectAnswer(index, btn, option, shuffledOptions);
                optionsContainer.appendChild(btn);
            });
        }

        function selectAnswer(selectedIndex, btnElement, optionData, optionsList) {
            if (hasAnsweredCurrent) return; hasAnsweredCurrent = true;
            const buttons = document.getElementById('options-container').querySelectorAll('button');
            const isCorrect = optionData.isCorrect;

            buttons.forEach((btn, idx) => {
                const opt = optionsList[idx];
                btn.classList.remove('hover:border-primary', 'hover:bg-blue-50', 'hover:shadow-md', 'group'); btn.style.cursor = 'default';
                const iconSpan = btn.querySelector('span');
                if (opt.isCorrect) {
                    btn.classList.replace('border-gray-200', 'border-green-500') || btn.classList.add('border-green-500', 'bg-green-50');
                    iconSpan.classList.add('bg-green-500', 'border-green-500', 'text-white'); iconSpan.innerHTML = '✓';
                } else if (idx === selectedIndex && !isCorrect) {
                    btn.classList.replace('border-gray-200', 'border-red-500') || btn.classList.add('border-red-500', 'bg-red-50');
                    iconSpan.classList.add('bg-red-500', 'border-red-500', 'text-white'); iconSpan.innerHTML = '✗';
                } else { btn.classList.add('opacity-40'); }
            });

            const feedbackContainer = document.getElementById('feedback-container'); const feedbackText = document.getElementById('feedback-text');
            feedbackContainer.className = 'mt-6 p-4 md:p-6 rounded-xl transition-all border-l-8';
            if (isCorrect) {
                score++; document.getElementById('quiz-score').textContent = `ניקוד: ${score}`;
                feedbackContainer.classList.add('bg-green-50', 'text-green-900', 'border-green-500');
                feedbackText.innerHTML = `<strong class="text-green-700 text-xl md:text-2xl block mb-1">מצוין! תשובה נכונה. 🎉</strong> ${optionData.rationale ? `<span class="block mt-2 font-normal text-green-800">${optionData.rationale}</span>` : ''}`;
                playAudio("יפה מאוד!");
            } else {
                feedbackContainer.classList.add('bg-red-50', 'text-red-900', 'border-red-500');
                feedbackText.innerHTML = `<strong class="text-red-700 text-xl md:text-2xl block mb-1">טעות...</strong> ${optionData.rationale ? `<span class="block mt-2 font-normal text-red-800">${optionData.rationale}</span>` : "נסה שוב פעם הבאה."}`;
            }
            feedbackContainer.classList.remove('hidden');
            const nextBtn = document.getElementById('next-btn'); nextBtn.classList.remove('hidden');
            if (currentQuestionIndex === currentQuizData.length - 1) {
                nextBtn.textContent = 'הצג סיכום 📊'; nextBtn.classList.remove('bg-primary', 'bg-red-600', 'bg-emerald-600'); nextBtn.classList.add('bg-gray-800', 'hover:bg-black');
            }
        }

        function nextQuestion() {
            if (currentQuestionIndex < currentQuizData.length - 1) { currentQuestionIndex++; loadQuestion(); } else { showResults(); }
        }

        function showResults() {
            if(megaQuizTimer) clearInterval(megaQuizTimer);
            document.getElementById('quiz-body').classList.add('hidden');
            document.getElementById('quiz-results').classList.remove('hidden');
            
            const total = currentQuizData.length;
            let message = ""; let bonusXP = 0;

            if (isMegaQuiz) {
                let basePoints = score * XP_RATES[currentDifficulty]; 
                if (score > (total/2) && timeLeft > 0) bonusXP = timeLeft; 
                const totalPointsEarned = basePoints + bonusXP;
                addXP(totalPointsEarned);
                if(score > userProgress.megaQuizHighScore) { userProgress.megaQuizHighScore = score; localStorage.setItem('verbHubProgress_v12', JSON.stringify(userProgress)); }
                message = score === total ? "מדהים! שליטה אבסולוטית בחומר האקדמי." : "כל הכבוד שסיימת את המבחן המסכם.";
                message += `<br><span class="text-secondary font-bold">+${totalPointsEarned} XP (כולל ${bonusXP} בונוס זמן)</span>`;
            } else if (isReadingQuiz) {
                saveReadingProgress(currentReadingId, score, total);
                let totalPointsEarned = score * XP_RATES['reading'];
                message = score === total ? "הבנה מעולה של הטקסט!" : "כדאי לקרוא שוב בעיון.";
                message += `<br><span class="text-secondary font-bold">+${totalPointsEarned} XP</span>`;
            } else {
                saveModuleProgress(currentModuleId, currentDifficulty, score, total);
                message = score === total ? "מושלם! אתה שולט ברמה הזו." : (score >= total * 0.6 ? "עבודה טובה, כדאי לחזור קצת." : "כדאי לעבור על הכללים שוב.");
                message += `<br><span class="text-secondary font-bold">+${score * XP_RATES[currentDifficulty]} XP</span>`;
            }

            document.getElementById('final-score-text').innerHTML = `ענית נכונה על <strong class="text-primary text-4xl mx-1">${score}</strong> מתוך <strong class="text-gray-800 text-4xl mx-1">${total}</strong>.<br><span class="block mt-4 text-xl font-normal">${message}</span>`;
            const ctx = document.getElementById('resultsChart').getContext('2d');
            if (resultsChartInstance) resultsChartInstance.destroy();
            resultsChartInstance = new Chart(ctx, {
                type: 'doughnut', data: { labels: ['נכון', 'שגוי'], datasets: [{ data: [score, total - score], backgroundColor: ['#10B981', '#EF4444'], borderWidth: 3, borderColor: '#ffffff', hoverOffset: 8 }] },
                options: { responsive: true, maintainAspectRatio: false, cutout: '60%', plugins: { legend: { position: 'bottom', labels: { font: { family: 'Assistant', size: 18 } } } } }
            });
        }

        // ==========================================
        // 10. MEGA QUIZ LOGIC (Master Level)
        // ==========================================
        function renderMegaQuizIntro() {
            const div = document.createElement('div'); div.className = 'fade-in-up flex flex-col items-center justify-center min-h-[60vh] text-center space-y-8';
            div.innerHTML = `<div class="text-8xl animate-bounce">🔥</div><h1 class="text-5xl font-extrabold text-gray-900 tracking-tight">המבחן המסכם (Master)</h1><p class="text-2xl text-gray-600 max-w-2xl mx-auto leading-relaxed">המבחן בודק את הידע מכל הנושאים. למבחנים המסכמים יש מאגר שאלות בלעדי משלהם!<br><strong>זמן קצוב וקושי משתנה.</strong><br>בונוס XP משמעותי למסיימים מהר.</p>
                <div class="bg-red-50 border border-red-200 p-6 rounded-2xl max-w-2xl w-full text-center shadow-lg">
                    <h3 class="font-bold text-xl mb-4 text-red-800">בחר רמת מבחן והתחל שעון:</h3>
                    <div class="flex flex-col sm:flex-row justify-center gap-3">
                        <button onclick="startMegaQuiz('mega-medium')" class="flex-1 bg-white border-2 border-red-300 text-red-700 px-4 py-3 rounded-lg font-bold hover:bg-red-100 transition shadow-sm">רמה בינונית<br><span class="text-sm font-normal">15 שאלות | 8 דקות</span></button>
                        <button onclick="startMegaQuiz('mega-hard')" class="flex-1 bg-white border-2 border-red-400 text-red-800 px-4 py-3 rounded-lg font-bold hover:bg-red-200 transition shadow-sm">רמה קשה<br><span class="text-sm font-normal">20 שאלות | 12 דקות</span></button>
                        <button onclick="startMegaQuiz('mega-degree')" class="flex-1 bg-white border-2 border-red-600 text-red-900 px-4 py-3 rounded-lg font-black hover:bg-red-300 transition shadow-md">רמת תואר<br><span class="text-sm font-normal">25 שאלות | 18 דקות</span></button>
                    </div>
                </div>`;
            return div;
        }

        function startMegaQuiz(diff) {
            currentDifficulty = diff;
            let qCount = 15;

            if(diff === 'mega-medium') { timeLeft = 8 * 60; qCount = 15; }
            else if(diff === 'mega-hard') { timeLeft = 12 * 60; qCount = 20; }
            else if(diff === 'mega-degree') { timeLeft = 18 * 60; qCount = 25; }

            let allQuestions = megaQuizPool.filter(q => q.difficulty === diff);
            
            allQuestions.sort(() => 0.5 - Math.random());
            currentQuizData = allQuestions.slice(0, qCount); 
            
            isMegaQuiz = true; isReadingQuiz = false;
            
            let titleText = diff === 'mega-medium' ? 'רמה בינונית' : (diff === 'mega-hard' ? 'רמה קשה' : 'רמת תואר');
            const mainContent = document.getElementById('main-content');
            mainContent.innerHTML = getQuizHTML(`מבחן מסכם (${titleText})`, 'mega');
            
            document.getElementById('quiz-intro').classList.add('hidden');
            document.getElementById('quiz-layout').classList.remove('hidden');
            
            const m = Math.floor(timeLeft / 60).toString().padStart(2, '0');
            const s = (timeLeft % 60).toString().padStart(2, '0');
            document.getElementById('quiz-header-extra').innerHTML = `<div id="timer-display" class="font-mono font-bold text-xl bg-gray-800 text-white px-4 py-1 rounded-md">${m}:${s}</div>`;
            
            resetQuiz();
            megaQuizTimer = setInterval(() => {
                timeLeft--; updateTimerDisplay();
                if(timeLeft <= 0) { clearInterval(megaQuizTimer); handleMegaQuizTimeout(); }
            }, 1000);
        }

        function updateTimerDisplay() {
            const timerEl = document.getElementById('timer-display'); if(!timerEl) return;
            const m = Math.floor(timeLeft / 60).toString().padStart(2, '0');
            const s = (timeLeft % 60).toString().padStart(2, '0');
            timerEl.textContent = `${m}:${s}`;
            if (timeLeft <= 15) { timerEl.classList.remove('bg-gray-800'); timerEl.classList.add('bg-red-600', 'animate-pulse-fast'); }
        }

        function handleMegaQuizTimeout() {
            document.getElementById('quiz-body').classList.add('hidden');
            document.getElementById('quiz-results').classList.remove('hidden');
            document.getElementById('final-score-text').innerHTML = `<strong class="text-red-600 text-3xl block mb-2">נגמר הזמן! ⏰</strong>הספקת לענות נכונה על <strong class="text-primary text-3xl mx-1">${score}</strong> תשובות.`;
            showResults();
        }

        // ==========================================
        // 11. STARTUP
        // ==========================================
        document.addEventListener('DOMContentLoaded', initApp);

    </script>
</body>
</html>
